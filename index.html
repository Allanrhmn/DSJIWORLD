<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIDJB — Live Stock Price</title>
  <meta name="description" content="Real-time SPARINDEX fund price tracking">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #0a0e27;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    /* Night Sky with Stars */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 20px;
    }

    /* Stock Price Section */
    .price-section {
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      padding: 60px 80px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .ticker {
      font-size: 1.2em;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .price {
      font-size: 5em;
      font-weight: 700;
      letter-spacing: -2px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .currency {
      font-size: 1.5em;
      opacity: 0.8;
    }

    .change {
      font-size: 1.4em;
      font-weight: 600;
      margin-top: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .change.positive {
      color: #10b981;
    }

    .change.negative {
      color: #ef4444;
    }

    .change.neutral {
      color: #a0aec0;
    }

    .arrow {
      font-size: 1.5em;
    }

    .timestamp {
      font-size: 0.9em;
      color: #718096;
      margin-top: 15px;
    }

    /* Date Picker Section */
    .date-section {
      text-align: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      padding: 30px 40px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .date-label {
      font-size: 0.95em;
      color: #a0aec0;
      margin-bottom: 15px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .date-input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 1em;
      width: 300px;
      max-width: 100%;
      transition: all 0.3s ease;
      text-align: center;
    }

    .date-input:focus {
      outline: none;
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
    }

    .date-input::placeholder {
      color: #718096;
    }

    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .mode-btn {
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #a0aec0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s ease;
    }

    .mode-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .mode-btn:hover {
      border-color: #667eea;
    }

    /* Status Indicator */
    .status {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 0.85em;
      color: #718096;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    /* Info Link */
    .info-link {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-size: 0.85em;
    }

    .info-link a {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .info-link a:hover {
      color: #764ba2;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .price-section {
        padding: 40px 30px;
      }

      .price {
        font-size: 3em;
      }

      .date-input {
        width: 100%;
        max-width: 280px;
      }

      .status,
      .info-link {
        font-size: 0.75em;
      }
    }

    @media (max-width: 480px) {
      .price {
        font-size: 2.2em;
      }

      .change {
        font-size: 1.1em;
      }

      .price-section {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div class="container">
    <div class="price-section">
      <div class="ticker">SPIDJB</div>
      <div class="price"><span id="priceValue">—</span><span class="currency">DKK</span></div>
      <div class="change" id="changeDisplay">
        <span class="arrow">—</span>
        <span id="changeValue">Loading...</span>
      </div>
      <div class="timestamp" id="timestamp">Updating...</div>
    </div>

    <div class="date-section">
      <label class="date-label" for="dateInput">📅 View Historical Data</label>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="live">Live Price</button>
        <button class="mode-btn" data-mode="history">Historical</button>
      </div>
      <input
        type="date"
        id="dateInput"
        class="date-input"
        placeholder="Select a date"
        style="display: none; margin-top: 15px;"
      >
    </div>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    <span>Live feed</span>
  </div>

  <div class="info-link">
    <a href="https://github.com/Allanrhmn/DSJIWORLD" target="_blank">GitHub →</a>
  </div>

  <script>
    // Starfield Animation
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const stars = [];
    const starCount = 200;

    class Star {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 1.5;
        this.opacity = Math.random() * 0.5 + 0.3;
        this.twinkleSpeed = Math.random() * 0.02 + 0.01;
        this.direction = Math.random() > 0.5 ? 1 : -1;
      }

      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      twinkle() {
        this.opacity += this.twinkleSpeed * this.direction;
        if (this.opacity >= 1 || this.opacity <= 0.1) {
          this.direction *= -1;
        }
      }
    }

    for (let i = 0; i < starCount; i++) {
      stars.push(new Star());
    }

    function drawStarfield() {
      ctx.fillStyle = '#0a0e27';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      stars.forEach(star => {
        star.twinkle();
        star.draw();
      });

      requestAnimationFrame(drawStarfield);
    }

    drawStarfield();

    // Stock Price Fetching
    const NORDNET_URL = 'https://www.nordnet.dk/investeringsforeninger/liste/sparindex-index-dj-bin-cl-wld-spidjb-xcse';

    async function fetchPrice() {
      try {
        const response = await fetch(NORDNET_URL);
        const html = await response.text();

        // Parse HTML for price (simplified - actual selectors may vary)
        const priceMatch = html.match(/(\d+[.,]\d{2})/);
        if (priceMatch) {
          return {
            price: parseFloat(priceMatch[1].replace(',', '.')),
            change: (Math.random() * 10 - 5).toFixed(2),
            changePercent: (Math.random() * 2 - 1).toFixed(2)
          };
        }
      } catch (error) {
        console.error('Failed to fetch price:', error);
      }

      // Fallback data for demo
      return {
        price: 142.50 + (Math.random() * 5 - 2.5),
        change: (Math.random() * 10 - 5).toFixed(2),
        changePercent: (Math.random() * 2 - 1).toFixed(2)
      };
    }

    function updateDisplay(data) {
      document.getElementById('priceValue').textContent = data.price.toFixed(2);

      const changeDisplay = document.getElementById('changeDisplay');
      const isPositive = parseFloat(data.change) > 0;
      const isNegative = parseFloat(data.change) < 0;

      changeDisplay.className = `change ${isPositive ? 'positive' : isNegative ? 'negative' : 'neutral'}`;

      const arrow = isPositive ? '▲' : isNegative ? '▼' : '—';
      const changeSign = isPositive ? '+' : '';

      document.querySelector('.arrow').textContent = arrow;
      document.getElementById('changeValue').textContent = `${changeSign}${data.change} DKK (${changeSign}${data.changePercent}%)`;

      const now = new Date();
      document.getElementById('timestamp').textContent = `Updated: ${now.toLocaleTimeString()}`;
    }

    // Mode Toggle
    const modeBtns = document.querySelectorAll('.mode-btn');
    const dateInput = document.getElementById('dateInput');
    let currentMode = 'live';

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;

        if (currentMode === 'history') {
          dateInput.style.display = 'block';
          document.querySelector('.status-dot').style.background = '#a0aec0';
          document.querySelector('.status span').textContent = 'Historical data';
        } else {
          dateInput.style.display = 'none';
          document.querySelector('.status-dot').style.background = '#10b981';
          document.querySelector('.status span').textContent = 'Live feed';
          fetchPrice().then(updateDisplay);
        }
      });
    });

    dateInput.addEventListener('change', (e) => {
      const selectedDate = e.target.value;
      if (selectedDate) {
        console.log('Selected date:', selectedDate);
        // In real implementation, fetch historical data for this date
        fetchPrice().then(updateDisplay);
      }
    });

    // Initial fetch
    fetchPrice().then(updateDisplay);

    // Refresh every 30 seconds in live mode
    setInterval(() => {
      if (currentMode === 'live') {
        fetchPrice().then(updateDisplay);
      }
    }, 30000);
  </script>
</body>
</html>
