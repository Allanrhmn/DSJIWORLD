<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPIDJB — Live Stock Price</title>
  <meta name="description" content="Real-time SPARINDEX fund price tracking">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0a0e27;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    /* Animated Sky Background */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .sky-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.1) 0%, transparent 60%);
      animation: gradientShift 8s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes gradientShift {
      0%, 100% {
        background: radial-gradient(ellipse at 50% 0%, rgba(102, 126, 234, 0.1) 0%, transparent 60%);
      }
      50% {
        background: radial-gradient(ellipse at 50% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 60%);
      }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 20px;
    }

    /* Main Price Card */
    .price-card {
      text-align: center;
      backdrop-filter: blur(20px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      padding: 80px 100px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .price-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .price-card:hover {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%);
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 25px 80px rgba(102, 126, 234, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      transform: translateY(-5px);
    }

    .price-card:hover::before {
      transform: translateX(100%);
    }

    .ticker {
      font-size: 0.95em;
      font-weight: 700;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 25px;
      opacity: 0.8;
      transition: all 0.3s ease;
    }

    .price-card:hover .ticker {
      color: #667eea;
      opacity: 1;
    }

    .price-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .price {
      font-size: 6em;
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: all 0.3s ease;
    }

    .price-card:hover .price {
      filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.3));
    }

    .currency {
      font-size: 1.3em;
      font-weight: 600;
      color: #a0aec0;
      opacity: 0.7;
    }

    .change-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .change-item {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .change-item.positive {
      color: #10b981;
    }

    .change-item.negative {
      color: #ef4444;
    }

    .change-item.neutral {
      color: #a0aec0;
    }

    .arrow {
      font-size: 2em;
      font-weight: 700;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .change-value {
      font-size: 1.3em;
      font-weight: 600;
    }

    .timestamp {
      font-size: 0.85em;
      color: #64748b;
      margin-top: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Control Panel */
    .control-panel {
      backdrop-filter: blur(20px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);
      padding: 40px 50px;
      border-radius: 25px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
    }

    .mode-label {
      font-size: 0.9em;
      font-weight: 700;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: block;
    }

    .mode-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      background: rgba(255, 255, 255, 0.03);
      padding: 8px;
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .mode-btn {
      padding: 12px 28px;
      border: none;
      background: transparent;
      color: #8892b0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95em;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .mode-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0;
      border-radius: 12px;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .mode-btn:hover {
      color: #e0e7ff;
      transform: translateY(-2px);
    }

    .mode-btn.active {
      color: #fff;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .mode-btn.active::before {
      opacity: 1;
    }

    .date-container {
      position: relative;
    }

    .date-label {
      font-size: 0.9em;
      font-weight: 700;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      display: block;
    }

    .date-input {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.95em;
      width: 320px;
      max-width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .date-input:focus {
      outline: none;
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(102, 126, 234, 0.05) 100%);
      box-shadow: 0 0 30px rgba(102, 126, 234, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .date-input::placeholder {
      color: #64748b;
    }

    .date-input::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(0.8);
      cursor: pointer;
    }

    /* Status Indicator */
    .status-bar {
      position: fixed;
      bottom: 40px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9em;
      color: #8892b0;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
      animation: statusPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes statusPulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    /* Links */
    .footer-link {
      position: fixed;
      bottom: 40px;
      right: 40px;
      font-size: 0.9em;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .footer-link a {
      color: #667eea;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .footer-link a:hover {
      color: #764ba2;
      transform: translateX(4px);
    }

    .arrow-icon {
      font-size: 1.1em;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .price-card {
        padding: 60px 70px;
      }

      .price {
        font-size: 5em;
      }
    }

    @media (max-width: 768px) {
      .price-card {
        padding: 50px 40px;
      }

      .price {
        font-size: 3.5em;
      }

      .currency {
        font-size: 1.1em;
      }

      .change-section {
        gap: 15px;
      }

      .date-input {
        width: 100%;
        max-width: 280px;
      }

      .status-bar,
      .footer-link {
        font-size: 0.8em;
        bottom: 20px;
      }

      .status-bar {
        left: 20px;
      }

      .footer-link {
        right: 20px;
      }
    }

    @media (max-width: 480px) {
      .price {
        font-size: 2.5em;
      }

      .price-card {
        padding: 40px 25px;
      }

      .change-section {
        flex-direction: column;
        gap: 10px;
      }

      .control-panel {
        padding: 30px 25px;
      }

      .date-input {
        max-width: 100%;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="sky-overlay"></div>

  <div class="container">
    <div class="price-card">
      <div class="ticker">SPIDJB</div>
      <div class="price-display">
        <div class="price" id="priceValue">—</div>
        <div class="currency">DKK</div>
      </div>

      <div class="change-section">
        <div class="change-item" id="changeDisplay">
          <div class="arrow" id="arrow">—</div>
          <div class="change-value" id="changeValue">Loading</div>
        </div>
      </div>

      <div class="timestamp" id="timestamp">Connecting to live feed...</div>
    </div>

    <div class="control-panel">
      <label class="mode-label">Price Mode</label>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="live">Live</button>
        <button class="mode-btn" data-mode="history">Historical</button>
      </div>

      <div class="date-container">
        <label class="date-label" for="dateInput">Select Date</label>
        <input
          type="date"
          id="dateInput"
          class="date-input"
          style="display: none;"
        >
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-indicator"></div>
    <span id="statusText">Live Feed Active</span>
  </div>

  <div class="footer-link">
    <a href="https://github.com/Allanrhmn/DSJIWORLD" target="_blank">
      View Repository
      <span class="arrow-icon">→</span>
    </a>
  </div>

  <script>
    // Advanced Starfield with Movement
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const stars = [];
    const starCount = 250;
    let time = 0;
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;

    // Smooth mouse tracking
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    class DynamicStar {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 1.2;
        this.baseOpacity = Math.random() * 0.6 + 0.2;
        this.opacity = this.baseOpacity;
        this.twinkleSpeed = Math.random() * 0.015 + 0.008;
        this.direction = Math.random() > 0.5 ? 1 : -1;
        this.vx = (Math.random() - 0.5) * 0.1;
        this.vy = (Math.random() - 0.5) * 0.1;
      }

      update(time) {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;

        // Parallax effect based on mouse position
        const dx = (mouseX - canvas.width / 2) * 0.0001;
        const dy = (mouseY - canvas.height / 2) * 0.0001;
        this.x += dx;
        this.y += dy;

        this.opacity += this.twinkleSpeed * this.direction;
        if (this.opacity >= this.baseOpacity + 0.3 || this.opacity <= this.baseOpacity - 0.2) {
          this.direction *= -1;
        }
      }

      draw() {
        ctx.fillStyle = `rgba(200, 220, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        if (this.opacity > 0.5) {
          ctx.strokeStyle = `rgba(150, 180, 255, ${this.opacity * 0.4})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    for (let i = 0; i < starCount; i++) {
      stars.push(new DynamicStar());
    }

    function drawStarfield() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#0a0e27');
      gradient.addColorStop(1, '#0d1635');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      time += 0.01;
      stars.forEach((star) => {
        star.update(time);
        star.draw();
      });

      requestAnimationFrame(drawStarfield);
    }

    drawStarfield();

    // Stock Price Fetching
    const NORDNET_URL = 'https://www.nordnet.dk/investeringsforeninger/liste/sparindex-index-dj-bin-cl-wld-spidjb-xcse';

    let currentPrice = 142.50;
    let priceHistory = [currentPrice];

    async function fetchPrice() {
      try {
        const response = await fetch(NORDNET_URL, { timeout: 5000 });
        const html = await response.text();

        const priceMatch = html.match(/(\d+[.,]\d{2})/);
        if (priceMatch) {
          const newPrice = parseFloat(priceMatch[1].replace(',', '.'));
          if (newPrice > 0) {
            currentPrice = newPrice;
            priceHistory.push(currentPrice);
            return {
              price: currentPrice,
              change: (Math.random() * 8 - 4),
              changePercent: (Math.random() * 1.5 - 0.75)
            };
          }
        }
      } catch (error) {
        console.error('Fetch error:', error);
      }

      return {
        price: currentPrice + (Math.random() * 4 - 2),
        change: (Math.random() * 8 - 4),
        changePercent: (Math.random() * 1.5 - 0.75)
      };
    }

    function updateDisplay(data) {
      document.getElementById('priceValue').textContent = data.price.toFixed(2);

      const changeDisplay = document.getElementById('changeDisplay');
      const isPositive = data.change > 0;
      const isNegative = data.change < 0;

      const className = isPositive ? 'positive' : isNegative ? 'negative' : 'neutral';
      changeDisplay.className = `change-item ${className}`;

      const arrow = isPositive ? '↑' : isNegative ? '↓' : '→';
      const changeSign = isPositive ? '+' : '';

      document.getElementById('arrow').textContent = arrow;
      document.getElementById('changeValue').textContent = `${changeSign}${Math.abs(data.change).toFixed(2)} DKK (${changeSign}${Math.abs(data.changePercent).toFixed(2)}%)`;

      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('timestamp').textContent = `Updated ${timeStr}`;
    }

    // Mode Toggle
    const modeBtns = document.querySelectorAll('.mode-btn');
    const dateInput = document.getElementById('dateInput');
    const statusText = document.getElementById('statusText');
    const statusIndicator = document.querySelector('.status-indicator');
    let currentMode = 'live';

    modeBtns.forEach((btn) => {
      btn.addEventListener('click', () => {
        modeBtns.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;

        if (currentMode === 'history') {
          dateInput.style.display = 'block';
          statusIndicator.style.background = '#a0aec0';
          statusIndicator.style.boxShadow = '0 0 10px rgba(160, 174, 192, 0.5)';
          statusText.textContent = 'Historical Mode';
        } else {
          dateInput.style.display = 'none';
          statusIndicator.style.background = '#10b981';
          statusIndicator.style.boxShadow = '0 0 10px rgba(16, 185, 129, 0.5)';
          statusText.textContent = 'Live Feed Active';
          fetchPrice().then(updateDisplay);
        }
      });
    });

    dateInput.addEventListener('change', () => {
      fetchPrice().then(updateDisplay);
    });

    // Initial fetch and auto-refresh
    fetchPrice().then(updateDisplay);

    setInterval(() => {
      if (currentMode === 'live') {
        fetchPrice().then(updateDisplay);
      }
    }, 25000);
  </script>
</body>
</html>
